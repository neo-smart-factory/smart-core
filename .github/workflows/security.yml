name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate
          else
            echo "No package.json found, skipping npm audit"
          fi

      - name: Check for exposed secrets
        run: |
          echo "Checking for exposed secrets..."
          # Verificação simplificada - apenas verifica se existem arquivos de código fonte
          # Uma verificação completa de secrets seria implementada posteriormente

          # Conta arquivos JS/TS/JSON que não estão em node_modules ou .git
          source_files=$(find . -name "*.js" -o -name "*.ts" -o -name "*.json" 2>/dev/null | grep -v node_modules | grep -v ".git" | wc -l)

          if [ "$source_files" -eq 0 ]; then
            echo "✅ No source files found to check for secrets"
          else
            echo "ℹ️  Found $source_files source files - secrets check would run here"
            # TODO: Implementar verificação completa de secrets quando houver código fonte
            echo "✅ Secrets check skipped (template repository)"
          fi

      - name: Validate .env.example exists
        run: |
          if [ ! -f "env-example.txt" ] && [ ! -f ".env.example" ]; then
            echo "⚠️  No .env.example file found"
          else
            echo "✅ .env.example file exists"
          fi

